name: Aktualizuj README

on:
  schedule:
    - cron: '0 10 * * *'   # každý den v 10:00 UTC (= 12:00 CEST)
  workflow_dispatch:         # ruční spuštění z GitHub UI

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repozitáře
        uses: actions/checkout@v4

      - name: Nastav Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Nainstaluj závislosti
        run: pip install requests

      - name: Aktualizuj seznam repozitářů
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/update_repos.py

      - name: Ulož změny
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md
          git diff --staged --quiet || git commit -m "Aktualizuj seznam repozitářů [skip ci]"
          git push
